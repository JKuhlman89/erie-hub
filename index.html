<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erie Events Hub</title>

<style>
body { font-family: Arial; margin:0; background:#f7fbff; }
header { background:#0b5ed7; color:white; padding:20px; text-align:center; }
section { max-width:900px; margin:auto; padding:20px; }

.calendar-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.weekdays,.days {
  display:grid;
  grid-template-columns:repeat(7,1fr);
}

.weekdays {
  background:#e9f2ff;
  font-weight:bold;
  text-align:center;
}

.days div {
  border:1px solid #eee;
  min-height:50px;
  padding:4px;
  font-size:11px;
  overflow:hidden;
}

.event-day { background:#cfe2ff; }

.flyer-container {
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.flyer {
  min-width:200px;
  height:250px;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
}

.flyer img {
  width:100%;
  height:100%;
  object-fit:cover;
}

#modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,.5);
}

.modal-box {
  background:white;
  margin:10% auto;
  padding:20px;
  width:300px;
}

.card {
  border:1px solid #ddd;
  padding:5px;
  margin:5px 0;
}
</style>
</head>

<body>

<header><h1>Erie Events Hub</h1></header>

<!-- CALENDAR -->
<section>
<h2>Calendar</h2>

<div class="calendar-header">
<button onclick="prevMonth()">←</button>
<h3 id="monthLabel"></h3>
<button onclick="nextMonth()">→</button>
</div>

<div class="weekdays">
<div>Sun</div><div>Mon</div><div>Tue</div>
<div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
</div>

<div id="calendarDays" class="days"></div>
</section>

<!-- FLYERS -->
<section>
<h2>Event Flyers</h2>
<div id="flyerContainer" class="flyer-container"></div>
</section>

<!-- SUBMIT EVENT -->
<section>
<h2>Submit Event</h2>

<input id="name" placeholder="Event Name"><br><br>
<input id="date" type="date"><br><br>
<input id="time" type="time"><br><br>
<input id="location" placeholder="Location"><br><br>
<input id="host" placeholder="Host Name"><br><br>
<input id="fee" placeholder="Fee"><br><br>

<textarea id="details" placeholder="Details"></textarea><br><br>
<input id="link" placeholder="External Link"><br><br>
<input id="flyer" placeholder="Flyer Image URL"><br><br>

<button onclick="submitEvent()">Submit</button>
</section>

<!-- ADMIN LOGIN -->
<section id="loginSection">
<h2>Admin Login</h2>
<input id="username" placeholder="Email"><br><br>
<input id="password" type="password"><br><br>
<button onclick="login()">Login</button>
</section>

<!-- ADMIN -->
<section id="admin" style="display:none;">
<h2>Pending Approvals</h2>
<div id="pendingList"></div>
</section>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">
<h3 id="modalDate"></h3>
<div id="modalContent"></div>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAYsp0-0MJRuiupR4LQuuQLZkHNzHVIGE4",
  authDomain: "erie-hub.firebaseapp.com",
  projectId: "erie-hub"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// AUTH
function login(){
  auth.signInWithEmailAndPassword(username.value,password.value)
    .then(()=>loadPending())
    .catch(err=>alert(err.message));
}

auth.onAuthStateChanged(user=>{
  if(user){
    admin.style.display="block";
    loginSection.style.display="none";
    loadPending();
  }
});

// CALENDAR
let current = new Date();
let events = [];

function prevMonth(){
  current.setMonth(current.getMonth()-1);
  renderCalendar();
}

function nextMonth(){
  current.setMonth(current.getMonth()+1);
  renderCalendar();
}

function renderCalendar(){

  const year = current.getFullYear();
  const month = current.getMonth();

  monthLabel.innerText = current.toLocaleString("default", {
    month:"long",
    year:"numeric"
  });

  calendarDays.innerHTML = "";

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  for(let i=0;i<firstDay;i++){
    calendarDays.appendChild(document.createElement("div"));
  }

  for(let d=1; d<=daysInMonth; d++){

    const div = document.createElement("div");
    const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

    const dayEvents = events.filter(e=>e.date===dateStr);

    div.innerHTML = `<b>${d}</b>`;

    if(dayEvents.length){
      div.classList.add("event-day");

      const maxShow = 2;

      dayEvents.slice(0,maxShow).forEach(e=>{
        div.innerHTML += `<div>${e.name || "Untitled"}</div>`;
      });

      if(dayEvents.length > maxShow){
        div.innerHTML += `<div style="color:gray">+${dayEvents.length-maxShow} more</div>`;
      }
    }

    div.onclick=()=>openModal(dateStr);
    calendarDays.appendChild(div);
  }
}

// MODAL
function openModal(date){
  modal.style.display="block";
  modalDate.innerText = date;

  const dayEvents = events.filter(e=>e.date===date);

  modalContent.innerHTML = dayEvents.length
    ? dayEvents.map(e=>`
      <div class="card">
        <b>${e.name}</b><br>
        ${e.time||""}<br>
        ${e.location||""}<br>
        ${e.details||""}<br>

        ${e.link ? `<a href="${e.link}" target=

        ${auth.currentUser && e.id ? `
          <br><button onclick="deleteEvent('${e.id}')">Delete</button>
        `:""}
      </div>
    `).join("")
    : "No events";
}

function closeModal(){
  modal.style.display="none";
}

// SUBMIT
function submitEvent(){

  const nameInput = document.getElementById("name");
  const dateInput = document.getElementById("date");

  if(!nameInput.value || !dateInput.value){
    alert("Name and date required");
    return;
  }

  db.collection("pending").add({
    name:name.value,
    date:date.value,
    time:time.value,
    location:location.value,
    host:host.value,
    fee:fee.value,
    details:details.value,
    link:link.value,
    flyer:flyer.value,
    created:new Date()
  })
  .then(()=>alert("Submitted"))
  .catch(err=>console.error(err));
}

// ADMIN
function loadPending(){
  db.collection("pending").onSnapshot(s=>{
    pendingList.innerHTML="";

    s.forEach(doc=>{
      const e = doc.data();

      pendingList.innerHTML+=`
        <div class="card">
          <b>${e.name}</b><br>
          ${e.date}<br>
          <button onclick="approve('${doc.id}')">Approve</button>
          <button onclick="deletePending('${doc.id}')">Delete</button>
        </div>
      `;
    });
  });
}

function approve(id){
  const ref=db.collection("pending").doc(id);

  ref.get().then(doc=>{
    db.collection("events").add(doc.data()).then(()=>{
      ref.delete();
    });
  });
}

function deletePending(id){
  db.collection("pending").doc(id).delete();
}

// DELETE EVENT
function deleteEvent(id){
  db.collection("events").doc(id).delete();
}

// FLYERS
function openFlyer(url){
  modal.style.display="block";
  modalDate.innerText="Flyer";
  modalContent.innerHTML = `<img src="${url}" style="width:on loadEvents(){
  db.collection("events").onSnapshot(s=>{
    events=[];
    flyerContainer.innerHTML="";

    s.forEach(doc=>{
      const e = doc.data();

      events.push({
        id: doc.id,
        ...e
      });

      if(e.flyer){
        flyerContainer.innerHTML+=`
          <div class="flyer" onclick="openFlyer('${e.flyer}')">
            <img src="$          </div>
        `;
      }
    });

    renderCalendar();
  });
}

loadEvents();
renderCalendar();

</script>

</body>
</html>
