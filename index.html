<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erie Events Hub</title>

<style>
body { font-family: Arial; margin:0; background:#f7fbff; }
header { background:#0b5ed7; color:white; padding:20px; text-align:center; }
section { max-width:900px; margin:auto; padding:20px; }

.calendar-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.weekdays,.days {
  display:grid;
  grid-template-columns:repeat(7,1fr);
}

.weekdays {
  background:#e9f2ff;
  font-weight:bold;
  text-align:center;
}

.days div {
  border:1px solid #eee;
  min-height:50px;
  padding:4px;
  font-size:11px;
  overflow:hidden;
}

.event-day { background:#cfe2ff; }

.flyer-container {
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.flyer {
  min-width:200px;
  height:250px;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
}

.flyer img {
  width:100%;
  height:100%;
  object-fit:cover;
}

#modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  overflow:auto;
  z-index:1000;
}

.modal-box {
  background:white;
  margin:40px auto;
  padding:20px;
  max-width:90vw;
  max-height:90vh;
  overflow:auto;
  position:relative;
}

.card {
  border:1px solid #ddd;
  padding:5px;
  margin:5px 0;
}
</style>
</head>

<body>

<header><h1>Erie Events Hub</h1></header>

<!-- CALENDAR -->
<section>
<h2>Calendar</h2>

<div class="calendar-header">
<button onclick="prevMonth()">←</button>
<h3 id="monthLabel"></h3>
<button onclick="nextMonth()">→</button>
</div>

<div class="weekdays">
<div>Sun</div><div>Mon</div><div>Tue</div>
<div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
</div>

<div id="calendarDays" class="days"></div>
</section>

<!-- FLYERS -->
<section>
<h2>Flyers</h2>
<div id="flyerContainer" class="flyer-container"></div>
</section>

<!-- SUBMIT EVENT -->
<section>
<h2>Submit Event</h2>

<input id="name" placeholder="Event Name"><br><br>
<input id="date" type="date"><br><br>
<input id="time" type="time"><br><br>
<input id="location" placeholder="Location"><br><br>
<input id="host" placeholder="Host Name"><br><br>
<input id="fee" placeholder="Fee"><br><br>

<textarea id="details" placeholder="Details"></textarea><br><br>
<input id="link" placeholder="External Link"><br><br>
<input id="flyer" placeholder="Flyer Image URL"><br><br>

<button onclick="submitEvent()">Submit</button>
</section>

<!-- SEPARATE FLYER -->
<section>
<h2>Submit Flyer Only</h2>
<input id="flyerOnly" placeholder="Flyer Image URL"><br><br>
<button onclick="submitFlyer()">Submit Flyer</button>
</section>

<!-- LOGIN -->
<section id="loginSection">
<h2>Admin Login</h2>
<input id="username" placeholder="Email"><br><br>
<input id="password" type="password"><br><br>
<button onclick="login()">Login</button>
</section>

<!-- ADMIN -->
<section id="admin" style="display:none;">
<h2>Pending</h2>
   <button onclick="logout()">Logout</button>
<div id="pendingList"></div>
 
</section>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <button onclick="closeModal()" style="
      position:absolute;
      top:10px;
      right:10px;
      font-size:18px;
      padding:5px 10px;
      cursor:pointer;
    ">X</button>

    <h3 id="modalDate"></h3>
    <div id="modalContent"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAYsp0-0MJRuiupR4LQuuQLZkHNzHVIGE4",
  authDomain: "erie-hub.firebaseapp.com",
  projectId: "erie-hub"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let current = new Date();
let events = [];

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(username.value,password.value)
    .then(()=>loadPending())
    .catch(err=>alert(err.message));
}

auth.onAuthStateChanged(user=>{
  if(user){
    admin.style.display = "block";
    loginSection.style.display = "none";
    loadPending();
  } else {
    admin.style.display = "none";
    loginSection.style.display = "block";
  }
  loadEvents();
});

// NAV
function prevMonth(){
  current.setMonth(current.getMonth()-1);
  renderCalendar();
}

function nextMonth(){
  current.setMonth(current.getMonth()+1);
  renderCalendar();
}
//LOGOUT
  
function logout(){
  auth.signOut().then(()=>{
    admin.style.display = "none";
    loginSection.style.display = "block";
  });
}

// CALENDAR
function renderCalendar(){

  const year=current.getFullYear();
  const month=current.getMonth();

  monthLabel.innerText = current.toLocaleString("default",{month:"long",year:"numeric"});
  calendarDays.innerHTML="";

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    calendarDays.appendChild(document.createElement("div"));
  }

  for(let d=1; d<=daysInMonth; d++){

    const div=document.createElement("div");
    const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

    const dayEvents=events.filter(e=>e.date===dateStr);

    div.innerHTML=`<b>${d}</b>`;

    if(dayEvents.length){
      div.classList.add("event-day");

      dayEvents.slice(0,2).forEach(e=>{
        div.innerHTML+=`<div>${e.name}</div>`;
      });

      if(dayEvents.length>2){
        div.innerHTML+=`<div style="color:gray">+${dayEvents.length-2} more</div>`;
      }
    }

    div.onclick=()=>openModal(dateStr);
    calendarDays.appendChild(div);
  }
}

// MODAL
function openModal(date){
  modal.style.display="block";
  modalDate.innerText=date;

  const dayEvents=events.filter(e=>e.date===date);

  let html="";

  dayEvents.forEach(e=>{
    html+=`
      <div class="card">
        <b>${e.name}</b><br>
        ${e.time||""}<br>
        ${e.location||""}<br>
        ${e.details||""}<br>
    `;

   if(e.link){
  html += `<a href="${e.link}" target="_blank">More Info</a>`;
}

if(auth.currentUser && e.id){
  html += `<br><button onclick="deleteEvent('${e.id}')">Delete</button>`;
}

    html+=`</div>`;
  });

  modalContent.innerHTML = html || "No events";
}

function closeModal(){
  modal.style.display="none";
}

// SUBMIT EVENT
function submitEvent(){

  const nameInput = document.getElementById("name");
  const dateInput = document.getElementById("date");

  if(!nameInput.value || !dateInput.value){
    alert("Name + date required");
    return;
  }

  db.collection("pending").add({
    name: nameInput.value,
    date: dateInput.value,
    time: document.getElementById("time").value || "",
    location: document.getElementById("location").value || "",
    host: document.getElementById("host").value || "",
    fee: document.getElementById("fee").value || "",
    details: document.getElementById("details").value || "",
    link: document.getElementById("link").value || "",
    flyer: document.getElementById("flyer").value || "",
    created: new Date()
  })
  .then(()=>alert("Submitted"));
}


// SUBMIT FLYER ONLY
function submitFlyer(){
  if(!flyerOnly.value){
    alert("Enter flyer URL");
    return;
  }

  db.collection("flyers").add({
    flyer:flyerOnly.value,
    created:new Date()
  }).then(()=>alert("Flyer submitted"));
}

// ADMIN
function loadPending(){
  db.collection("pending").onSnapshot(s=>{
    pendingList.innerHTML="";

    s.forEach(doc=>{
      const e=doc.data();

      pendingList.innerHTML+=`
        <div class="card">
          <b>${e.name}</b><br>
          ${e.date}<br>
          <button onclick="approve('${doc.id}')">Approve</button>
          <button onclick="deletePending('${doc.id}')">Delete</button>
        </div>
      `;
    });
  });
}

function approve(id){
  db.collection("pending").doc(id).get().then(doc=>{
    db.collection("events").add(doc.data()).then(()=>{
      db.collection("pending").doc(id).delete();
    });
  });
}

function deletePending(id){
  db.collection("pending").doc(id).delete();
}

function deleteEvent(id){
  db.collection("events").doc(id).delete();
}

// FLYERS
function loadEvents(){
  db.collection("events").onSnapshot(s=>{
    events=[];
    flyerContainer.innerHTML="";

    s.forEach(doc=>{
      const e=doc.data();

      events.push({
        id:doc.id,
        ...e
      });

      if(e.flyer){
  const box=document.createElement("div");
  box.className="flyer";

  const img=document.createElement("img");
  img.src=e.flyer;
  img.onclick = () => openFlyer(e.flyer, e.id);

  box.appendChild(img);

  // ADMIN DELETE BUTTON
  if(auth.currentUser){
    const btn = document.createElement("button");
    btn.innerText = "Delete";
    btn.style.position = "absolute";
    btn.style.margin = "5px";
    btn.onclick = (ev) => {
      ev.stopPropagation(); // prevent image click
      if(confirm("Delete this flyer?")){
        deleteEvent(e.id);
      }
    };

    box.style.position = "relative";
    box.appendChild(btn);
  }

  flyerContainer.appendChild(box);
      }
    });

    renderCalendar();
  });
}


function openFlyer(url, id){
  modal.style.display = "block";
  modalDate.innerText = "Flyer";

  const isAdmin = auth.currentUser !== null;

  // build base HTML
  modalContent.innerHTML = `
    <div id="flyerWrapper" style="text-align:center;">
      ${url}
    </div>
  `;

  // if admin, ADD BUTTON PROPERLY
  if(isAdmin && id){
    const btn = document.createElement("button");
    btn.innerText = "Delete Flyer";

    btn.style.background = "red";
    btn.style.color = "white";
    btn.style.padding = "10px";
    btn.style.border = "none";
    btn.style.cursor = "pointer";
    btn.style.marginTop = "10px";

    btn.onclick = () => {
      if(confirm("Delete this flyer?")){
        deleteEvent(id);
        closeModal(); // optional but recommended
      }
    };

    document.getElementById("flyerWrapper").appendChild(btn);
  }
}

loadEvents();
renderCalendar();
</script>

</body>
</html>
