<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Erie Events Hub</title>

<style>
body { font-family: Arial; margin:0; background:#f7fbff; }
header { background:#0b5ed7; color:white; padding:20px; text-align:center; }
section { max-width:900px; margin:auto; padding:20px; }

.days { display:grid; grid-template-columns:repeat(7,1fr); }
.days div { border:1px solid #eee; min-height:50px; padding:4px; }

.flyer-container { display:flex; gap:10px; overflow-x:auto; }
.flyer { width:200px; height:250px; overflow:hidden; cursor:pointer; }
.flyer img { width:100%; height:100%; object-fit:cover; }

#modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.8);
  top:0; left:0;
}

.modal-box {
  background:white;
  margin:5% auto;
  padding:20px;
  max-width:90vw;
  max-height:90vh;
  overflow:auto;
  position:relative;
}
</style>
</head>

<body>

<header><h1>Erie Events Hub</h1></header>

<section>
<h2>Calendar</h2>
<div id="calendarDays" class="days"></div>
</section>

<section>
<h2>Flyers</h2>
<div id="flyerContainer" class="flyer-container"></div>
</section>

<section id="loginSection">
<h2>Admin Login</h2>
<input id="username"><br><br>
<input id="password" type="password"><br><br>
<button onclick="login()">Login</button>
</section>

<section id="admin" style="display:none;">
<button onclick="logout()">Logout</button>
</section>

<div id="modal">
  <div class="modal-box">
    <button onclick="closeModal()" style="position:absolute; right:10px;">X</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "erie-hub.firebaseapp.com",
  projectId: "erie-hub"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let events = [];

// ✅ LOGIN
function login(){
  auth.signInWithEmailAndPassword(username.value,password.value)
    .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
}

// ✅ AUTH STATE
auth.onAuthStateChanged(user=>{
  admin.style.display = user ? "block" : "none";
  loginSection.style.display = user ? "none" : "block";
  loadEvents(); // 🔑 re-render with correct auth state
});

// ✅ CALENDAR (basic)
function renderCalendar(){
  calendarDays.innerHTML="";
  for(let i=1;i<=30;i++){
    const d=document.createElement("div");
    d.innerText=i;
    calendarDays.appendChild(d);
  }
}

// ✅ DELETE EVENT
function deleteEvent(id){
  db.collection("events").doc(id).delete();
}

// ✅ MODAL (THIS IS THE IMPORTANT PART)
function openFlyer(url, id){
  modal.style.display="block";

  modalContent.innerHTML = `
    <div style="text-align:center;">
      <img src="${url}" style="max-width:100%;max-height>
  `;

  // ✅ BUTTON CREATED AFTER RENDER (RELIABLE)
  if(auth.currentUser){
    const btn = document.createElement("button");
    btn.innerText = "Delete";
    btn.style.background="red";
    btn.style.color="white";
    btn.style.padding="10px";
    btn.style.marginTop="10px";

    btn.onclick = ()=>{
      if(confirm("Delete this flyer?")){
        deleteEvent(id);
        closeModal();
      }
    };

    document.getElementById("deleteZone").appendChild(btn);
  }
}

// ✅ CLOSE MODAL
function closeModal(){
  modal.style.display="none";
}

// ✅ LOAD EVENTS (FIXED ID HANDLING)
function loadEvents(){
  db.collection("events").onSnapshot(snapshot=>{
    events=[];
    flyerContainer.innerHTML="";

    snapshot.forEach(doc=>{
      const e = {
        id: doc.id,
        ...doc.data()
      };

      events.push(e);

      if(e.flyer){
        const box=document.createElement("div");
        box.className="flyer";

        const img=document.createElement("img");
        img.src=e.flyer;

        // ✅ CRITICAL: PASS REAL ID
        img.onclick=()=>openFlyer(e.flyer, e.id);

        box.appendChild(img);
        flyerContainer.appendChild(box);
      }
    });
  });
}

// INIT
renderCalendar();
loadEvents();

</script>

</body>
</html>
`
